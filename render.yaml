services:
  - type: web
    name: api
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: servers/api/Dockerfile
    buildFilter:
      paths:
        - servers/api/**/*.ts
        - servers/api/**/*.json
        - servers/api/Dockerfile
        - packages/program/*.json
        - packages/program/**/*.ts
    envVars:
      - fromGroup: api
      - key: DATABASE_URL
        fromDatabase:
          name: hashfund
          property: connectionString
    domains:
      - "v1.api.hashfund.fun"
  - type: web
    runtime: docker
    name: watchdog
    plan: free
    autoDeploy: true
    dockerfilePath: servers/watchdog/Dockerfile
    buildFilter:
      paths:
        - servers/api/**/*.ts
        - servers/api/**/*.json
        - servers/api/Dockerfile
        - servers/watchdog/*.json
        - servers/watchdog/**/*.ts
        - packages/program/*.json
        - packages/program/**/*.ts
    envVars:
      - fromGroup: api
      - fromGroup: watchdog
      - key: DATABASE_URL
        fromDatabase:
          name: hashfund
          property: connectionString
      - key: WALLET_PRIVATE_KEY
        generateValue: true
databases:
  - name: hashfund
    databaseName: hashfund
    user: admin
    plan: free

