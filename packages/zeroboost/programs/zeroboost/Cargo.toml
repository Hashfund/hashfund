[package]
name = "zeroboost"
version = "0.1.0"
description = "Created with Anchor"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "zeroboost"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []
# idl-build = []
devnet = []

[dependencies]
anchor-lang = { version = "0.32.1", features = ["init-if-needed"] }
anchor-spl = { version = "0.32.1", features = ["borsh", "metadata"] }
curve = { path = "../../curve" }
raydium-cp-swap = { git = "https://github.com/raydium-io/raydium-cp-swap", rev = "609780fb3510522f2f7678ec7b09ca883833b7ad", features = [
  "no-entrypoint",
  "cpi",
  "devnet",
] }
solana-security-txt = "1.1.1"
bytemuck = { version = "1.4.0", features = ["derive", "min_const_generics"] }
pyth-sdk-solana = "0.10.1"
spl-token = { version = "4.0.0", features = ["no-entrypoint"] }
